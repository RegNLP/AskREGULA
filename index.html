<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AskRegula</title>
  <link rel="icon" type="image/png" href="images/askregulalogominimal2.png" />
  <style>
    :root {
      --bg-page: #f4f6fb;
      --surface: #ffffff;
      --border-subtle: #dde4f0;
      --accent: #0f3b63;
      --accent-soft: #e3edf7;
      --text-main: #13233b;
      --text-muted: #5d6c82;
      --shadow-card: 0 16px 40px rgba(11, 35, 70, 0.12);
      --radius-lg: 6px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top left, #ffffff 0, #f4f6fb 42%, #edf1f9 100%);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text-main);
    }

    .shell {
      padding: 32px 40px 36px;
      background: var(--surface);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-card);
      border: 1px solid var(--border-subtle);
      max-width: 520px;
      width: 100%;
      text-align: center;
    }

    .logo {
      margin-bottom: 20px;
    }

    .logo img {
      max-width: 180px;
      height: auto;
      display: inline-block;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 24px;
      letter-spacing: -0.03em;
    }

    p.subtitle {
      margin: 0 0 24px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
    }

    a.btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 18px;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      border: 1px solid transparent;
      min-width: 170px;
    }

    a.btn-primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #ffffff;
    }

    a.btn-secondary {
      background: var(--accent-soft);
      border-color: var(--border-subtle);
      color: var(--accent);
    }

    a.btn-primary:hover {
      background: #0c3254;
    }

    a.btn-secondary:hover {
      background: #dbe7f8;
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="logo">
      <img src="images/askregulalogo.png" alt="AskRegula" />
    </div>
    <h1>AskRegula</h1>
    <p class="subtitle">Select how you want to open the AskRegula workspace.</p>
    <div class="button-row">
      <a class="btn btn-primary" href="ui/enduser/enduserUI.html" target="_blank" rel="noopener noreferrer">User Console</a>
      <a class="btn btn-secondary" href="ui/admin/adminUI.html" target="_blank" rel="noopener noreferrer" title="Single-file admin console (no server needed)">Admin Console</a>
      <a class="btn btn-secondary" href="ui/review/expertUI.html" target="_blank" rel="noopener noreferrer">Expert Review Console</a>
    </div>
  </div>
</body>
</html>
